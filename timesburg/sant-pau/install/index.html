<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Descargar Widget</title>

<style>
  /* Reset y base */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif; overflow: hidden; color: #fff; }

  /* Fondo principal con imagen + overlay */
  body {
    background: url('./../img/01.jpg') no-repeat center center fixed; /* https://picsum.photos/1920/1080*/
    background-size: cover;
    position: relative;
  }

  /* Overlay negro semitransparente */
  .overlay {
    position: fixed;
    inset: 0;
    /* background-color: rgba(0,0,0,0.5); */
    background-color: rgba(13, 30, 10, 0.5);
    z-index: 0;
    margin: 0;
    border-radius: 0;
    overflow: hidden;
  }

  /* Gradientes flotantes + blur encima del overlay */
  .background {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(80,80,120,0.3), transparent 60%),
                radial-gradient(circle at 70% 80%, rgba(120,60,150,0.3), transparent 60%);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    z-index: 1;
    animation: floatBG 15s ease-in-out infinite alternate;
    overflow: hidden;
    border-radius: 0;
  }

  @keyframes floatBG {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(10px, -10px) scale(1.02); }
    100% { transform: translate(0,0) scale(1); }
  }

  /* Wrapper central */
  .wrapper {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
        align-items: center;
    justify-content: space-between;
    padding: 32px 24px;
  }

  header { text-align: center; opacity: 0.95; margin-top: 8px; }
  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    align-content: center;
    background: linear-gradient(90deg, rgb(20, 197, 79), rgb(0, 255, 187));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Contenido central estilo tarjeta */
  .center {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 32px 24px;
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.2);
    border-radius: 28px;
    max-width: 900px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.1);
    animation: fadeIn 1s ease forwards;
  }

  .center p {
    font-size: 1rem;
    color: #dcdcdc;
    line-height: 1.5;
    opacity: 0.9;
  }

  @keyframes fadeIn {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Botón moderno estilo iOS */
  .button {
    display: inline-block;
    padding: 16px 28px;
    /* background: linear-gradient(145deg, #0a84ff, #0066cc); */
    background: linear-gradient(145deg, #269431, #10b47b);
    border-radius: 18px;
    color: #fff;
    font-size: 1.05rem;
    font-weight: 600;
    text-decoration: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 10px 28px rgba(0,122,255,0.35);
    backdrop-filter: blur(12px);
  }

  .button:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 34px rgba(0,122,255,0.45);
  }

  .button:active {
    transform: scale(0.96);
    opacity: 0.85;
    box-shadow: 0 6px 18px rgba(0,122,255,0.25);
  }

  footer {
    text-align: center;
    font-size: 0.75rem;
    color: #8a8a8d;
    padding-bottom: 8px;
    opacity: 0.7;
  }

  @media(max-width: 400px){
    .center { padding: 24px 16px; }
    .button { padding: 14px 22px; font-size: 0.95rem; }
  }

</style>
</head>

<body>
  <div class="overlay"></div>
  <div class="background"></div>

  <div class="wrapper">

    <header>
      <h1>Widget Scriptable</h1>
    </header>

    <div class="center">
      <p>Descarga el widget y agrégalo a tu pantalla de inicio usando Scriptable. Funciona de manera rápida y elegante.</p>

      <a class="button"
         href="https://raw.githubusercontent.com/alibhtty/buildup/main/timesburg/sant-pau/install/HTsantpau.js"
         download="HTsantpau.js">
         Descargar Widget
      </a>
    </div>

    <footer>
      Created by Ali Bhtty – 4Bdev®
    </footer>

  </div>
</body>
</html>
